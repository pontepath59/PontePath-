<!DOCTYPE html>

<html>

<head>

  <title>PontePath</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {

      margin: 0;

      font-family: Arial;

      background: linear-gradient(#1a1a2e, #16213e);

      color: white;

      display: flex;

      flex-direction: column;

      height: 100dvh;

    }

    #chat {

      flex: 1;

      overflow-y: auto;

      padding: 15px;

      display: flex;

      flex-direction: column;

      gap: 10px;

    }

    .msg {

      max-width: 75%;

      padding: 12px;

      border-radius: 16px;

      line-height: 1.4;

    }

    .user {

      align-self: flex-end;

      background: #4f7cff;

    }

    .bot {

      align-self: flex-start;

      background: #2a2a2a;

    }

    #inputArea {

      display: flex;

      padding: 10px;

      background: black;

    }

    #input {

      flex: 1;

      padding: 12px;

      border-radius: 10px;

      border: none;

      font-size: 16px;

    }

    button {

      margin-left: 10px;

      padding: 12px 16px;

      border: none;

      border-radius: 10px;

      background: #f4d03f;

      font-weight: bold;

    }

  </style>

</head>

<body>

  <div id="chat"></div>

  <div id="inputArea">

    <input id="input" placeholder="What’s on your heart?" />

    <button onclick="send()">Send</button>

  </div>

  <script>

    async function send() {

      const input = document.getElementById("input");

      const chat = document.getElementById("chat");

      const message = input.value.trim();

      if (!message) return;

      // user message

      const userMsg = document.createElement("div");

      userMsg.className = "msg user";

      userMsg.innerText = message;

      chat.appendChild(userMsg);

      input.value = "";

      // scroll

      chat.scrollTop = chat.scrollHeight;

      // call API

      const res = await fetch("/api/chat", {

        method: "POST",

        headers: {

          "Content-Type": "application/json"

        },

        body: JSON.stringify({ message })

      });

      const data = await res.json();

      // bot message

      const botMsg = document.createElement("div");

      botMsg.className = "msg bot";

      botMsg.innerText = data.reply;

      chat.appendChild(botMsg);

      // scroll again

      chat.scrollTop = chat.scrollHeight;

    }

  </script>

</body>

</html>
