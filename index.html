<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PontePath</title>

<style>

* {

  box-sizing: border-box;

  margin: 0;

  padding: 0;

  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

}

/* 🌌 BACKGROUND (UPGRADED) */

body {

  background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);

  color: #fff;

  height: 100vh;

  display: flex;

  flex-direction: column;

}

/* CHAT CONTAINER */

#chat {

  flex: 1;

  overflow-y: auto;

  padding: 20px 16px 90px;

  display: flex;

  flex-direction: column;

  gap: 14px;

}

/* MESSAGE BASE */

.message {

  max-width: 80%;

  padding: 14px 16px;

  border-radius: 18px;

  line-height: 1.5;

  font-size: 16px;

  animation: fadeIn 0.25s ease;

}

/* AI MESSAGE */

.ai {

  background: rgba(255,255,255,0.08);

  backdrop-filter: blur(8px);

  align-self: flex-start;

  border-bottom-left-radius: 6px;

}

/* USER MESSAGE */

.user {

  background: linear-gradient(135deg, #4f7cff, #7c5cff);

  align-self: flex-end;

  border-bottom-right-radius: 6px;

}

/* INPUT BAR */

#inputBar {

  position: fixed;

  bottom: 0;

  width: 100%;

  padding: 12px;

  background: rgba(15, 23, 42, 0.95);

  backdrop-filter: blur(10px);

  border-top: 1px solid rgba(255,255,255,0.08);

  display: flex;

  gap: 10px;

}

/* INPUT FIELD */

#input {

  flex: 1;

  padding: 14px;

  border-radius: 14px;

  border: none;

  outline: none;

  font-size: 16px;

  background: #1e293b;

  color: white;

}

/* SEND BUTTON */

#send {

  background: #facc15;

  color: #000;

  border: none;

  padding: 0 18px;

  border-radius: 12px;

  font-weight: 600;

  cursor: pointer;

}

/* TYPING DOTS */

.typing {

  display: flex;

  gap: 5px;

  padding: 10px;

}

.dot {

  width: 6px;

  height: 6px;

  background: #ccc;

  border-radius: 50%;

  animation: blink 1.4s infinite;

}

.dot:nth-child(2) { animation-delay: 0.2s; }

.dot:nth-child(3) { animation-delay: 0.4s; }

/* ANIMATIONS */

@keyframes fadeIn {

  from { opacity: 0; transform: translateY(6px); }

  to { opacity: 1; transform: translateY(0); }

}

@keyframes blink {

  0%, 80%, 100% { opacity: 0.2; }

  40% { opacity: 1; }

}

</style>

</head>

<body>

<div id="chat"></div>

<div id="inputBar">

  <input id="input" placeholder="What’s on your heart?" />

  <button id="send">Send</button>

</div>

<script>

const chat = document.getElementById("chat");

const input = document.getElementById("input");

const send = document.getElementById("send");

/* ADD MESSAGE */

function addMessage(text, type) {

  const div = document.createElement("div");

  div.className = "message " + type;

  div.innerText = text;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

/* TYPING INDICATOR */

function showTyping() {

  const typing = document.createElement("div");

  typing.className = "message ai typing";

  typing.id = "typing";

  typing.innerHTML = `

    <div class="dot"></div>

    <div class="dot"></div>

    <div class="dot"></div>

  `;

  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

}

function removeTyping() {

  const typing = document.getElementById("typing");

  if (typing) typing.remove();

}

/* SEND MESSAGE */

async function sendMessage() {

  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");

  input.value = "";

  showTyping();

  try {

    const res = await fetch("/api/chat", {

      method: "POST",

      headers: {

        "Content-Type": "application/json"

      },

      body: JSON.stringify({

        messages: [{ role: "user", content: text }]

      })

    });

    const data = await res.json();

    removeTyping();

    addMessage(

      (data.reply || "I'm here with you. Tell me more.").replace(/\n+/g, "\n\n"),

      "ai"

    );

  } catch (err) {

    removeTyping();

    addMessage("Something went wrong. Try again.", "ai");

  }

}

/* EVENTS */

send.onclick = sendMessage;

input.addEventListener("keypress", (e) => {

  if (e.key === "Enter") sendMessage();

});

</script>

</body>

</html>
