<!DOCTYPE html>

<html>

<head>

  <title>PontePath</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>

    body {

      margin: 0;

      font-family: Arial;

      background: linear-gradient(#1a1a2e, #16213e);

      color: white;

      display: flex;

      flex-direction: column;

      height: 100vh;

    }

    #chat {

      flex: 1;

      overflow-y: auto;

      padding: 15px;

      display: flex;

      flex-direction: column;

      gap: 10px;

    }

    .msg {

      max-width: 75%;

      padding: 12px;

      border-radius: 16px;

      line-height: 1.4;

    }

    .user {

      background: #5c7cfa;

      align-self: flex-end;

    }

    .bot {

      background: #2d2d2d;

      align-self: flex-start;

    }

    #inputArea {

      display: flex;

      padding: 10px;

      background: #000;

    }

    #input {

      flex: 1;

      padding: 12px;

      border-radius: 10px;

      border: none;

    }

    button {

      margin-left: 10px;

      padding: 12px 18px;

      background: #f5d142;

      border: none;

      border-radius: 10px;

      font-weight: bold;

    }

  </style>

</head>

<body>

<div id="chat"></div>

<div id="inputArea">

  <input id="input" placeholder="What’s on your heart?" />

  <button onclick="sendMessage()">Send</button>

</div>

<script>

let chatHistory = [];

async function sendMessage() {

  const input = document.getElementById("input");

  const message = input.value.trim();

  if (!message) return;

  const chat = document.getElementById("chat");

  // USER MESSAGE

  const userMsg = document.createElement("div");

  userMsg.className = "msg user";

  userMsg.innerText = message;

  chat.appendChild(userMsg);

  input.value = "";

  chatHistory.push({ role: "user", content: message });

  try {

    const response = await fetch("/api/chat", {

      method: "POST",

      headers: {

        "Content-Type": "application/json"

      },

      body: JSON.stringify({

        messages: chatHistory.slice(-8) // short memory

      })

    });

    const data = await response.json();

    const botMsg = document.createElement("div");

    botMsg.className = "msg bot";

    botMsg.innerText = data.reply || "Something went wrong.";

    chat.appendChild(botMsg);

    chatHistory.push({ role: "assistant", content: data.reply });

    chat.scrollTop = chat.scrollHeight;

  } catch (err) {

    const botMsg = document.createElement("div");

    botMsg.className = "msg bot";

    botMsg.innerText = "Connection issue. Try again.";

    chat.appendChild(botMsg);

  }

}

</script>

</body>

</html>
