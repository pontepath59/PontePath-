<!DOCTYPE html>

<html>

<head>

  <title>PontePath</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>

    body {

      margin: 0;

      font-family: Arial;

      background: linear-gradient(#1a1a2e, #16213e);

      color: white;

      display: flex;

      flex-direction: column;

      height: 100vh;

    }

    #chat {

      flex: 1;

      padding: 15px;

      overflow-y: auto;

      display: flex;

      flex-direction: column;

    }

    .msg {

      margin-bottom: 12px;

      padding: 12px;

      border-radius: 12px;

      max-width: 80%;

    }

    .user {

      background: #3a86ff;

      align-self: flex-end;

    }

    .ai {

      background: #222;

      align-self: flex-start;

    }

    #inputBox {

      display: flex;

      padding: 10px;

      background: #111;

    }

    input {

      flex: 1;

      padding: 12px;

      border: none;

      border-radius: 8px;

    }

    button {

      margin-left: 10px;

      padding: 12px;

      background: gold;

      border: none;

      border-radius: 8px;

      font-weight: bold;

    }

  </style>

</head>

<body>

<div id="chat"></div>

<div id="inputBox">

  <input id="input" placeholder="What's on your heart?" />

  <button onclick="send()">Send</button>

</div>

<script>

async function send() {

  const input = document.getElementById("input");

  const text = input.value;

  if (!text) return;

  addMessage(text, "user");

  input.value = "";

  const res = await fetch("/api/chat", {

    method: "POST",

    headers: { "Content-Type": "application/json" },

    body: JSON.stringify({ message: text })

  });

  const data = await res.json();

  addMessage(data.reply, "ai");

}

function addMessage(text, type) {

  const div = document.createElement("div");

  div.className = "msg " + type;

  div.innerText = text;

  document.getElementById("chat").appendChild(div);

}

</script>

</body>

</html>
