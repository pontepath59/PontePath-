<!DOCTYPE html>

<html>

<head>

  <title>PontePath</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {

      margin: 0;

      font-family: Arial;

      background: linear-gradient(#1a1a2e, #16213e);

      color: white;

      display: flex;

      flex-direction: column;

      height: 100vh;

      overflow: hidden;

    }

  

    
#chat {

  flex: 1;

  overflow-y: auto;

  padding: 10px;

  display: flex;

  flex-direction: column;

  justify-content: flex-start;


}

  




      

    

      

      

    

    .msg {

      margin-bottom: 12px;

      padding: 10px;

      border-radius: 12px;

      max-width: 80%;

      line-height: 1.4;

    }

    .user {

      background: #4a6cf7;

      align-self: flex-end;

    }

    .bot {

      background: #222;

      align-self: flex-start;

    }

    #inputArea {

      display: flex;

      padding: 10px;

      background: #111;

    }

    #input {

      flex: 1;

      padding: 12px;

      border-radius: 8px;

      border: none;

      font-size: 16px;

    }

    button {

      margin-left: 10px;

      padding: 12px 16px;

      background: gold;

      border: none;

      border-radius: 8px;

      font-weight: bold;

    }

  </style>

</head>

<body>

  <div id="chat"></div>

  <div id="inputArea">

    <input id="input" placeholder="What’s on your heart?" />

    <button onclick="send()">Send</button>

  </div>

  <script>

    async function send() {

      const input = document.getElementById("input");

      const chat = document.getElementById("chat");

      const message = input.value.trim();

      if (!message) return;

      // show user message

      const userMsg = document.createElement("div");

      userMsg.className = "msg user";

      userMsg.innerText = message;

      chat.appendChild(userMsg);

      input.value = "";

      // scroll down

      chat.scrollTo({

  top: chat.scrollHeight,

  behavior: "smooth"

});

      // call your API

      const res = await fetch("/api/chat", {

        method: "POST",

        headers: {

          "Content-Type": "application/json"

        },

        body: JSON.stringify({ message })

      });

      const data = await res.json();

      const botMsg = document.createElement("div");

      botMsg.className = "msg bot";

      botMsg.innerText = data.reply;

      chat.appendChild(botMsg);

      chat.scrollTop = chat.scrollHeight;

    }

  </script>

</body>

</html>
